version: '3.8'

services:
  # The central database for storing jobs, forms, and AI vectors
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: atlas_postgres
    environment:
      POSTGRES_USER: atlas_admin
      POSTGRES_PASSWORD: super_secret_password_123
      POSTGRES_DB: atlas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The memory database used by BullMQ to process background AI reports
  redis:
    image: redis:7-alpine
    container_name: atlas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
